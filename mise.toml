[tools]
dprint = "latest"

[tasks.setup]
description = "Initialize repo (submodules, dependencies)"
run = """
git submodule update --init --recursive
echo "Setup complete"
"""

[tasks.format]
description = "Format code using dprint"
run = """
# uvx ruff check --fix
# Format other supported files using dprint
dprint fmt
"""

[tasks.sync]
description = "Sync components to various local agent frameworks"
depends = [
  "sync:skills",
  "sync:agents",
]

[tasks."sync:skills"]
description = "Sync all skills (local + remote) to ~/.agents/skills"
depends = ["sync:impeccable"]
run = """
mkdir -p ~/.agents/skills
rsync -avL --delete ./skills/ ~/.agents/skills/ --exclude remote-skills.txt

# Install remote skills from registry
if [ -f ./skills/remote-skills.txt ]; then
  while IFS= read -r line; do
    line=$(echo "$line" | sed 's/#.*//' | xargs)
    [ -z "$line" ] && continue
    echo "Installing: mh skills add $line"
    (cd ~ && mh skills add $line)
  done < ./skills/remote-skills.txt
  echo "Remote skills synced"
fi

# Claude reads skills from ~/.claude/skills — symlink to shared location
if [ -d ~/.claude/skills ] && [ ! -L ~/.claude/skills ]; then
  rm -rf ~/.claude/skills
fi
ln -sfn ~/.agents/skills ~/.claude/skills

mise run format
echo "Synced all skills to ~/.agents/skills"
"""

[tasks."sync:impeccable"]
description = "Clone/update pbakaus/impeccable and save skills locally"
run = """
REPO_URL="https://github.com/pbakaus/impeccable.git"
CACHE_DIR="$HOME/.cache/impeccable"
SRC="$CACHE_DIR/source/skills"
DEST="./skills"

# Clone or update the repo
if [ -d "$CACHE_DIR/.git" ]; then
  echo "Updating impeccable repo..."
  git -C "$CACHE_DIR" pull --ff-only
else
  echo "Cloning impeccable repo..."
  git clone "$REPO_URL" "$CACHE_DIR"
fi

# Copy frontend-design skill (with references)
mkdir -p "$DEST/frontend-design"
rsync -av --delete "$SRC/frontend-design/" "$DEST/frontend-design/"
echo "Saved frontend-design skill"

# Copy all other skills into frontend-improver/references (strip YAML frontmatter)
mkdir -p "$DEST/frontend-improver/references"
for dir in "$SRC"/*/; do
  cmd=$(basename "$dir")
  [ "$cmd" = "frontend-design" ] && continue
  awk 'BEGIN{f=0} /^---$/{f++; next} f>=2' "$dir/SKILL.md" | sed -e '/./,$!d' > "$DEST/frontend-improver/references/$cmd.md"
  echo "  Copied $cmd.md"
done
echo "Saved steering commands to $DEST/frontend-improver/references/"
"""

[tasks."sync:agents"]
description = "Sync _AGENTS.md to all agent frameworks"
run = """
rsync -av ./_AGENTS.md ~/.pi/agent/AGENTS.md
rsync -av ./_AGENTS.md ~/.codex/AGENTS.md
rsync -av ./_AGENTS.md ~/.claude/CLAUDE.md
rsync -av ./_AGENTS.md ~/.factory/AGENTS.md
rsync -av ./_AGENTS.md ~/.config/amp/AGENTS.md
echo "Synced _AGENTS.md to all frameworks"
"""

