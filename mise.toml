[tools]
dprint = "latest"

[tasks.format]
description = "Format code using dprint"
run = """
# Format Python code
uvx ruff check --fix
# Format other supported files using dprint
dprint fmt
"""

[tasks."sync:pi"]
description = "Sync Pi components in ~/.pi/agent"
run = """
# Ensure target directory exists
mkdir -p ~/.pi/agent

# Create symlinks for Pi components
ln -sfn "$(pwd)/agents" ~/.pi/agent/agents
ln -sfn "$(pwd)/prompts" ~/.pi/agent/prompts
ln -sfn "$(pwd)/skills" ~/.pi/agent/skills
ln -sfn "$(pwd)/pi/extensions" ~/.pi/agent/extensions
ln -sfn "$(pwd)/_AGENTS.md" ~/.pi/agent/AGENTS.md

echo "Synced Pi components to ~/.pi/agent"
"""

[tasks."sync:codex:skills"]
description = "Sync skills to ~/.codex/skills"
run = """
mkdir -p ~/.codex/skills
for skill_dir in ./skills/*/; do
  if [ -e "$skill_dir/SKILL.md" ]; then
    skill_name=$(basename "$skill_dir")
    ln -sfn "$(pwd)/skills/$skill_name" ~/.codex/skills/"$skill_name"
    echo "Linked: $skill_name -> ~/.codex/skills/$skill_name"
  fi
done
"""

[tasks."sync:claude:skills"]
description = "Sync skills to ~/.claude/skills"
run = """
mkdir -p ~/.claude/skills
for skill_dir in ./skills/*/; do
  if [ -e "$skill_dir/SKILL.md" ]; then
    skill_name=$(basename "$skill_dir")
    ln -sfn "$(pwd)/skills/$skill_name" ~/.claude/skills/"$skill_name"
    echo "Linked: $skill_name -> ~/.claude/skills/$skill_name"
  fi
done
"""
