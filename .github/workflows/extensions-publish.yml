name: Publish Extensions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "extensions/*/package.json"

permissions:
  contents: read
  id-token: write # Required for npm trusted publishing (OIDC)

jobs:
  detect:
    name: Detect changed extensions
    runs-on: ubuntu-latest
    outputs:
      extensions: ${{ steps.check.outputs.extensions }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install semver
        run: npm install -g semver

      - name: Check extensions for version changes
        id: check
        run: |
          shopt -s nullglob
          extensions="[]"
          has_error=false

          for pkg in extensions/*/package.json; do
            dir=$(dirname "$pkg")
            name=$(jq -r '.name' "$pkg")
            local_version=$(jq -r '.version' "$pkg")

            # Get published version from npm, distinguishing "not found" from real errors
            npm_output=$(npm view "$name" version 2>&1) && exit_code=0 || exit_code=$?

            if [ $exit_code -ne 0 ]; then
              if echo "$npm_output" | grep -qi "404\|not found\|E404"; then
                echo "🆕 $name@$local_version (new package, will publish)"
                extensions=$(echo "$extensions" | jq -c --arg dir "$dir" --arg name "$name" --arg version "$local_version" '. + [{"dir": $dir, "name": $name, "version": $version}]')
                continue
              else
                echo "❌ $name: npm registry lookup failed"
                echo "   Error: $npm_output"
                has_error=true
                continue
              fi
            fi

            published_version="$npm_output"

            # Compare versions using semver: only publish if local is strictly newer
            if semver "$local_version" -r ">$published_version" > /dev/null 2>&1; then
              echo "📦 $name: $published_version -> $local_version (will publish)"
              extensions=$(echo "$extensions" | jq -c --arg dir "$dir" --arg name "$name" --arg version "$local_version" '. + [{"dir": $dir, "name": $name, "version": $version}]')
            else
              echo "✓ $name@$local_version (up to date)"
            fi
          done

          if [ "$has_error" = true ]; then
            echo "::error::One or more npm registry lookups failed. Check logs above."
            exit 1
          fi

          echo "extensions=$extensions" >> "$GITHUB_OUTPUT"
          echo ""
          echo "Extensions to publish: $(echo "$extensions" | jq length)"

  publish:
    name: Publish ${{ matrix.extension.name }}@${{ matrix.extension.version }}
    needs: detect
    if: ${{ needs.detect.outputs.extensions != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extension: ${{ fromJson(needs.detect.outputs.extensions) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: ${{ matrix.extension.dir }}
        run: npm install --no-fund --no-audit

      - name: Publish
        working-directory: ${{ matrix.extension.dir }}
        run: npm publish --access public
